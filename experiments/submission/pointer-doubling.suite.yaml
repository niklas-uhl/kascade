name: pointer-doubling
executable: bench/kascade
output_path_option_name: "output-file"
ncores: [64, 128, 256, 512, 1024, 2048]
time_limit: 4
threads_per_rank: [1]
# tasks_per_node: 64
graphs:
  - generator: kagen
    type: path
    N: 20
    extra_args:
      statistics-level: extensive-reduced-output
      input-processing: none
      verify-level: 0
      iterations: 3
    scale_weak: True
  - generator: kagen
    type: path
    N: 20
    permute: True
    extra_args:
      statistics-level: extensive-reduced-output
      input-processing: none
      verify-level: 0
      iterations: 3
    scale_weak: True
  - generator: kagen
    type: path
    N: 20
    permute: True
    permutation_prob: 0.01
    extra_args:
      statistics-level: extensive-reduced-output
      input-processing: none
      verify-level: 0
      iterations: 3
    scale_weak: True
  - generator: kagen
    type: path
    N: 20
    permute: True
    permutation_prob: 0.1
    extra_args:
      statistics-level: extensive-reduced-output
      input-processing: none
      verify-level: 0
      iterations: 3
    scale_weak: True
config:
  - algorithm: PointerDoubling
    pointer-doubling-use-no-local-preprocessing: [False, True]
    pointer-doubling-use-grid-communication: [False]
    pointer-doubling-aggregation-level: [none]
    pointer-doubling-fallback-allgather-size-ratio: [3]
  - algorithm: PointerDoubling
    pointer-doubling-use-no-local-preprocessing: [False, True]
    pointer-doubling-grid-communication-mode: [topology-aware, balanced]
    pointer-doubling-aggregation-level: [none]
    pointer-doubling-fallback-allgather-size-ratio: [3]

